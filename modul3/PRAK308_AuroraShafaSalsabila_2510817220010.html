<html>
<head>
<title> Form Pendaftaran Kursus </title>
</head>
<body>

<table border="1" cellspacing="0" cellpadding="0" width="600">
    
    <tr>
        <td bgcolor="skyblue" align="center" height="80">
            <font color="red" size="6" face="arial"><b>Pendaftaran Kursus</b></font>
        </td>
    </tr>
    
    <tr>
        <td bgcolor="gray">
            <form>
            <table border="0" cellspacing="5" cellpadding="5" width="100%">
                <tr>
                    <td colspan="2">
                        <font size="4" face="arial"><b>Data Diri</b></font>
                    </td>
                </tr>
                <tr>
                    <td width="35%">Nama</td>
                    <td><input type="text" name="nama" size="30"></td>
                </tr>
                <tr>
                    <td>Nim</td>
                    <td><input type="text" name="nim" size="30"></td>
                </tr>
                <tr>
                    <td>E-mail</td>
                    <td><input type="text" name="email" size="30"></td>
                </tr>
                <tr>
                    <td>Tanggal Lahir</td>
                    <td><input type="date" name="tgl_lahir"></td> 
                </tr>
                <tr>
                    <td valign="top">Jenis Kelamin</td>
                    <td>
                        <input type="radio" name="jenis_kelamin" value="L"> Laki-laki<br>
                        <input type="radio" name="jenis_kelamin" value="P"> Perempuan
                    </td>
                </tr>
                <tr>
                    <td valign="top">Pilih Program Kursus</td>
                    <td>
                        <input type="checkbox" name="kursus_1" value="C#"> C#<br>
                        <input type="checkbox" name="kursus_2" value="Java"> Java<br>
                        <input type="checkbox" name="kursus_3" value="SQL"> SQL<br>
                        <input type="checkbox" name="kursus_4" value="HTML_PHP"> HTML dan PHP
                    </td>
                </tr>
                <tr>
                    <td>Pilihan Hari/Jam Kursus</td>
                    <td>
                        <select name="waktu">
                            <option value="senin-rabu">Senin - Rabu/09.00 - 11.00</option>
                        </select>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
    
    <tr>
        <td bgcolor="salmon">
            <table border="0" cellspacing="5" cellpadding="5" width="100%">
                <tr>
                    <td>
                        <font color="maroon">Komentar Anda</font><br>
                        <textarea name="komentar" rows="5" cols="60"></textarea><br><br>
                        
                        <input type="reset" value="Reset">
                        <input type="submit" value="Submit">
                        <input type="button" value="Cancel">
                    </td>
                </tr>
            </table>
            </form>
        </td>
    </tr>
</table>

</body>
</html>
